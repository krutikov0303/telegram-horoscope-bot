name: Daily horoscope

on:
  schedule:
    # 05:27 UTC ~= 08:27 Europe/Kyiv during summer time (UTC+3).
    # GitHub cron uses UTC only. In winter (UTC+2), use 06:27 UTC for 08:27 Kyiv.
    - cron: "27 5 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOROSCOPE_LANG: ${{ vars.HOROSCOPE_LANG }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          HOROSCOPE_SKIP_COVER: ${{ vars.HOROSCOPE_SKIP_COVER }}
          HOROSCOPE_POST_FOOTER: ${{ vars.HOROSCOPE_POST_FOOTER }}
          HOROSCOPE_TZ: ${{ vars.HOROSCOPE_TZ }}
        run: python scripts/publish_horoscope.py
