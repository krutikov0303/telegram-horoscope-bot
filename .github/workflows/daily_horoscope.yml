name: Daily horoscope

on:
  schedule:
    # 06:27 UTC = 08:27 Europe/Kyiv (офіційний час України зараз UTC+2, без переведення годинника).
    # GitHub приймає лише UTC; затримка старту cron на Actions інколи до кількох хвилин — це норма.
    - cron: "27 6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Прибирає попередження про Node 20 у checkout/setup-python (не пов’язано з Python-скриптом)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOROSCOPE_LANG: ${{ vars.HOROSCOPE_LANG }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          HOROSCOPE_SKIP_COVER: ${{ vars.HOROSCOPE_SKIP_COVER }}
        run: python scripts/publish_horoscope.py
