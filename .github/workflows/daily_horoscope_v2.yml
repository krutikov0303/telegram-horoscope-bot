name: Daily horoscope v2

on:
  schedule:
    # 08:00 Kyiv ≈ 05:00 UTC (summer UTC+3) or 06:00 UTC (winter UTC+2).
    # Два слоти на день: перший успішний запуск публікує, другий — SKIP (вже є в .state).
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute Kyiv date
        id: kyiv_date
        shell: bash
        run: echo "date=$(TZ=Europe/Kyiv date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore posted state
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .state/posted_dates.txt
          key: posted-v2-${{ steps.kyiv_date.outputs.date }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            posted-v2-${{ steps.kyiv_date.outputs.date }}-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Publish
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOROSCOPE_LANG: ${{ vars.HOROSCOPE_LANG }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          HOROSCOPE_SKIP_COVER: ${{ vars.HOROSCOPE_SKIP_COVER }}
          HOROSCOPE_COVER_STYLE: ${{ vars.HOROSCOPE_COVER_STYLE }}
          HOROSCOPE_POST_FOOTER: ${{ vars.HOROSCOPE_POST_FOOTER }}
          HOROSCOPE_TZ: Europe/Kyiv
          # Не використовуємо вузьке вікно — GitHub schedule часто запізнюється.
          HOROSCOPE_ENFORCE_TIME_GATE: "0"
          HOROSCOPE_STATE_PATH: .state/posted_dates.txt
          HOROSCOPE_POSTED_FLAG_PATH: .state/posted.flag
        run: python scripts/publish_horoscope.py

      - name: Save posted state
        if: github.event_name == 'schedule' && hashFiles('.state/posted.flag') != ''
        uses: actions/cache/save@v4
        with:
          path: .state/posted_dates.txt
          key: posted-v2-${{ steps.kyiv_date.outputs.date }}-${{ github.run_id }}-${{ github.run_attempt }}
